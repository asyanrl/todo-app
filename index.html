<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>To Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>✨ My To Do List</h1>

  <div class="top">
    <div class="profile">
      <p><b>User</b></p>
      <small>Karyawan</small>
    </div>
    <div id="time"></div>
  </div>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Tambah tugas...">
    <select id="priority">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
    <button onclick="addTask()">+</button>
  </div>

  <div class="lists">
    <div>
      <h3>📌 To Do</h3>
      <ul id="todoList"></ul>
    </div>

    <div>
      <h3>✅ Done</h3>
      <ul id="doneList"></ul>
    </div>
  </div>

  <button class="deleteAll" onclick="deleteAll()">🗑 Delete All</button>
</div>

<script src="script.js"></script>
</body>
</html>
